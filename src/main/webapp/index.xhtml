<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core">
<h:head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<title>Nomina</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous"></link>
<style>
		table {
			font-family: arial, sans-serif;
			width: 100%;
			background-color: #636262;
			color: white;
			box-shadow: 0px 4px 8px rgba(0,0,0,0.2);
		}
		
		td, th {
		    border: 1px solid #dddddd;
			text-align: Center;
			padding: 8px;
			margin-top: 10px;
		}
		
		th{
			background-color: #27850b;
			color: white;
		}
		
		tr:nth-child(even) {
			background-color: white;
			color: black;
		}
	</style>
</h:head>






<h:body
	style="text-align: center;display: flex; justify-content: center">

	<div class="container text-center">
		<div class="row">
			<div class="card"
				style=" text-align: center; margin-top: 3%; box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);">
				<h:messages styleClass="alert alert-danger" />
				<script>
					setTimeout(function() {
						let alert = document.querySelector(".alert");
						if (alert) {
							alert.style.display = "none";
						}
					}, 3000);
				</script>
				<h:form>
					<div class="card-body">
						<h6 class="card-title">Digite los datos del empleado</h6>
					</div>

					<div class="container text-center">
						<div class="row">
							<div class="col">
								<h:outputLabel for="id" value="Identificación:" />
							</div>
							<div class="col">
								<h:inputText id="id" value="#{cdt.nom.emp.id}" required="true">
								</h:inputText>
							</div>
						</div>
						<div class="row" style="padding-top: 5px">
							<div class="col">
								<h:outputLabel for="nombre" value="Nombre:" />
							</div>
							<div class="col">
								<h:inputText id="nombre" value="#{cdt.nom.emp.nombre}"
									required="true" />
							</div>
						</div>
						<div class="row" style="padding-top: 5px">
							<div class="col">
								<h:outputLabel for="apellido" value="Apellido:" />
							</div>
							<div class="col">
								<h:inputText id="Apellido" value="#{cdt.nom.emp.apellido}"
									required="true" />
							</div>
						</div>
						<div class="row" style="padding-top: 5px">
							<div class="col">
								<h:outputLabel for="correo" value="Correo:" />
							</div>
							<div class="col">
								<h:inputText id="correo" value="#{cdt.nom.emp.correo}"
									required="true">
									<f:validateRegex pattern="^[A-Za-z0-9+_.-]+@[A-Za-z0-9.-]+$" />
								</h:inputText>
							</div>
						</div>
						<div class="row" style="padding-top: 8px">
							<div class="col">
								<h:outputLabel for="salario" value="Salario Basico:" />
							</div>
							<div class="col">
								<h:selectOneMenu style="widht:12px" id="salario"
									styleClass="form-select" value="#{cdt.nom.emp.salario}">

									<f:selectItem itemValue="1750000"
										itemLabel="1'750.000$" />
									<f:selectItem itemValue="2000000"
										itemLabel="2'000.000$" />
									<f:selectItem itemValue="2500000"
										itemLabel="2'500.000$" />
									<f:selectItem itemValue="3000000"
										itemLabel="3'000.000$" />
									<f:selectItem itemValue="4000000"
										itemLabel="4'000.000$" />
									<f:selectItem itemValue="5000000"
										itemLabel="5'000.000$" />
								</h:selectOneMenu>
							</div>
						</div>
						<div class="row" style="padding-top: 5px">
							<div class="col">
								<h:outputLabel for="dias" value="Días trabajados:" />
							</div>

							<div class="col">
								<h:inputText id="dias" value="#{cdt.nom.dias}" type="number"
									required="true"
									styleClass="form-control">

									<f:validateLongRange minimum="1" maximum="30" />

									<f:ajax event="keyup" render="msgDias" />
								</h:inputText>

								<h:message id="msgDias" for="dias" style="color:red" />
							</div>
						</div>
					</div>
					<div class="card-body">
						<div id="liveAlertPlaceholder"></div>
						<h:commandButton value="Calcular Nomina"
							class="btn btn-outline-success" action="#{cdt.registrar}">
							<f:ajax execute="@form" render="@form tablaNomina" />
						</h:commandButton>
					</div>
				</h:form>
			</div>
		</div>


		<div class="row">
			<div class="card"
				style="text-align: center; margin-top: 3%; box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);">
				<br></br>
				<h3>Registro de Nominas</h3>

				<div class="card-body">
					<div id="tabla">
						<div class="row">
							<h:form>
								<h:commandButton value="Regresar"
									class="btn btn-outline-success" action="#{cdt.regresar}">
								</h:commandButton>
							</h:form>
						</div>

						<div class="row" style="padding-top: 30px"></div>
						<div class="row" style="padding-top: 15px">
							<h:dataTable id="tablaNomina" value="#{cdt.lista}" var="a"
								border="1">
								<h:column>
									<f:facet name="header">Identificación</f:facet>
		                #{a.emp.id}
		            </h:column>
								<h:column>
									<f:facet name="header">Nombre</f:facet>
		                #{a.emp.nombre}
		            </h:column>
								<h:column>
									<f:facet name="header">Apellido</f:facet>
		                #{a.emp.apellido}
		            </h:column>
								<h:column>
									<f:facet name="header">Correo</f:facet>
		                #{a.emp.correo}
		            </h:column>
								<h:column>
									<f:facet name="header">Salario</f:facet>
		                #{a.emp.salario}<a> $</a>
		            </h:column>
								<h:column>
									<f:facet name="header">Dias Trabajados</f:facet>
		                #{a.dias}
		            </h:column>
							</h:dataTable>
						</div>
					</div>
				</div>
			</div>
			
		</div>
	</div>




	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
		crossorigin="anonymous"></script>
</h:body>
</html>
